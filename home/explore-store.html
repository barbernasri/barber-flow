<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر | BarberFlow Pro</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="./css/explore-store.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- الهيدر -->
    <header class="store-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
        <h1>🛍️ متجر الحلاقة والتجميل</h1>
        <button class="cart-btn" onclick="location.href='market/cart.html'">
            <i class="fas fa-shopping-cart"></i>
            <span id="cartCount" class="badge">0</span>
        </button>
    </header>

    <!-- شريط البحث والتصفية -->
    <section class="filters-section">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن منتج، أداة، ماركة...">
        </div>
        
        <div class="categories-scroll">
            <button class="cat-btn active" data-cat="all">الكل</button>
            <button class="cat-btn" data-cat="tools">أدوات ومعدات</button>
            <button class="cat-btn" data-cat="cosmetics">مستحضرات تجميل</button>
            <button class="cat-btn" data-cat="haircare">عناية بالشعر</button>
            <button class="cat-btn" data-cat="skincare">عناية بالبشرة</button>
            <button class="cat-btn" data-cat="accessories">إكسسوارات</button>
        </div>
    </section>

    <!-- شبكة المنتجات -->
    <main class="products-container">
        <div id="productsGrid" class="products-grid">
            <!-- سيتم ملؤه بواسطة explore-store.js -->
            <div class="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>جاري تحميل المنتجات...</p>
            </div>
        </div>
    </main>

    <script type="module" src="./js/explore-store.js"></script>
</body>
</html>
