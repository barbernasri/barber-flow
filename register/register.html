<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">إنشاء حساب جديد | BarberFlow Pro</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module" src="../js/router.js"></script>
</head>
<body>
    <div id="notification-container"></div>

    <div class="auth-container">
        <div id="registerStep" class="hidden-step">
            <h2 id="registerHeading">إنشاء حساب جديد</h2>
            <p class="step-desc" id="registerSubheading">قم بملء البيانات التالية للمتابعة</p>
            
            <form id="unifiedRegisterForm">
                <div class="input-group">
                    <label for="regName" id="labelName">الاسم الكامل</label>
                    <input type="text" id="regName" placeholder="أدخل اسمك الكامل" required>
                </div>
                <div class="input-group">
                    <label for="regIdentifier">البريد الإلكتروني أو رقم الهاتف</label>
                    <input type="text" id="regIdentifier" placeholder="06... أو example@mail.com" required>
                </div>
                
                <div class="input-group hidden-step" id="passwordGroup">
                    <label for="regPassword">كلمة المرور</label>
                    <input type="password" id="regPassword" placeholder="أدخل كلمة مرور قوية">
                </div>

                <button type="submit" id="mainSubmitBtn" class="auth-btn">
                    <span id="submitBtnText">متابعة التسجيل</span> <i class="fas fa-arrow-left"></i>
                </button>
            </form>

            <div class="divider">
                <span>أو التسجيل السريع</span>
            </div>

            <div class="social-login-container">
                <button type="button" id="googleBtn" class="google-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    <span>سجل باستخدام Google</span>
                </button>
            </div>

            <div class="auth-footer">
                <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
            </div>
        </div>

        <div id="verifyStep" class="hidden-step">
            <div class="verify-icon"><i class="fas fa-shield-alt"></i></div>
            <h2 id="verifyHeading">تأكيد الحساب</h2>
            <p class="step-desc">أدخل كود التحقق المكون من 6 أرقام المرسل إليك</p>
            <div class="input-group">
                <label for="otpCode">كود التحقق</label>
                <input type="text" id="otpCode" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" placeholder="0 0 0 0 0 0">
            </div>
            <button type="button" id="confirmOtpBtn" class="auth-btn">تأكيد وفتح الحساب</button>
            
            <div class="auth-footer">
                <p id="timerContainer">إعادة الإرسال خلال: <span id="timer">60</span> ثانية</p>
                <button type="button" id="resendCodeBtn" class="back-link-btn" style="display:none;">إعادة إرسال الكود</button>
                <button type="button" id="backToRegisterBtn" class="back-link-btn">
                    <i class="fas fa-edit"></i> تعديل المعلومات
                </button>
            </div>
        </div>

        <div class="back-home-container">
            <button type="button" id="backHomeBtn" class="outline-btn">
                <i class="fas fa-sign-out-alt"></i> <span>العودة للرئيسية</span>
            </button>
        </div>
    </div>

    <div id="recaptcha-container"></div>

    <script type="module" src="register.js"></script>
</body>
</html>
