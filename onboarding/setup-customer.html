<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="جاري تجهيز حسابك">
    <title>جاري التجهيز... | BarberFlow Pro</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- التنسيقات العامة -->
    <link rel="stylesheet" href="../shared/css/global.css">
    
    <!-- تنسيقات التنبيهات -->
    <link rel="stylesheet" href="../auth/css/notifications.css">
    
    <!-- تنسيقات الصفحة -->
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-primary);
        }
        
        .loading-container {
            text-align: center;
            padding: 40px;
        }
        
        .loading-icon {
            font-size: 4rem;
            color: var(--brand-accent);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        .loading-text {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        
        .loading-subtext {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <!-- حاوية الإشعارات -->
    <div id="notification-container"></div>

    <div class="loading-container">
        <i class="fas fa-cut loading-icon"></i>
        <h1 class="loading-text">مرحباً بك في BarberFlow Pro</h1>
        <p class="loading-subtext">جاري تجهيز عالم الأناقة الخاص بك...</p>
    </div>

    <!-- السكربتات -->
    <script type="module" src="setup-customer.js"></script>
</body>
</html>
