<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التجهيز... | BarberFlow-Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   <!-- <script type="module" src="../auth/js/router.js"></script>-->

 <style>
     :root {
            --gold-primary: #d4af37;
            --bg-dark: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .welcome-container {
            text-align: center;
            animation: fadeIn 1.2s ease-out;
        }

        .logo-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .logo-icon {
            font-size: 4rem;
            color: var(--gold-primary);
            animation: pulse 2s infinite ease-in-out;
        }

        .loader-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 2px solid transparent;
            border-top-color: var(--gold-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .text-content h1 {
            color: white;
            font-size: 1.5rem;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .text-content p {
            color: #888;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
 </style>
  
</head>
<body>

    <div class="welcome-container">
        <div class="logo-wrapper">
            <div class="loader-ring"></div>
            <i class="fas fa-cut logo-icon"></i>
        </div>
        <div class="text-content">
            <h1>مرحباً بك في BarberFlow</h1>
            <p>جاري تجهيز عالم الأناقة الخاص بك...</p>
        </div>
    </div>

    <div id="notification-container"></div>

    <script type="module" src="js/setup-customer.js"></script>
</body>
</html>
