<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="إكمال ملف الزبون الشخصي">
    <title>إكمال ملفي الشخصي | BarberFlow Pro</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- التنسيقات العامة -->
    <link rel="stylesheet" href="../shared/css/global.css">
    
    <!-- تنسيقات التنبيهات -->
    <link rel="stylesheet" href="../auth/css/notifications.css">
    
    <!-- تنسيقات الصفحة -->
    <link rel="stylesheet" href="css/add-style.css">
</head>
<body>
    <!-- حاوية الإشعارات -->
    <div id="notification-container"></div>

    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <i class="fas fa-user logo-icon"></i>
            <h1 class="title">لنكمل ملفك الشخصي 👤</h1>
            <p class="subtitle">هذه التفاصيل تساعدنا في تقديم أفضل العروض المناسبة لك</p>
        </div>

        <!-- نموذج الزبون -->
        <form id="customerSetupForm">
            <!-- المعلومات الأساسية -->
            <div class="section-card">
                <h2 class="section-title">
                    <i class="fas fa-info-circle"></i>
                    المعلومات الأساسية
                </h2>

                <div class="input-group">
                    <label for="userPhotoInput">الصورة الشخصية</label>
                    <div class="photo-uploader" id="photoUploader">
                        <div id="photoPreview">
                            <i class="fas fa-user-circle placeholder-icon"></i>
                            <span class="uploader-label">اضغط لاختيار صورة شخصية</span>
                        </div>
                        <input type="file" id="userPhotoInput" accept="image/*" style="display: none;">
                    </div>
                </div>

                <div class="input-group">
                    <label for="birthDate">تاريخ الميلاد (اختياري)</label>
                    <input 
                        type="date" 
                        id="birthDate"
                    >
                </div>

                <div class="input-group">
                    <label for="userAddress">العنوان</label>
                    <input 
                        type="text" 
                        id="userAddress" 
                        placeholder="مثال: الدار البيضاء، حي المعاريف"
                        required
                    >
                </div>
            </div>

            <!-- أزرار التحكم -->
            <button type="submit" class="submit-btn" id="submitBtn">
                <span>حفظ والبدء في الاستكشاف</span>
                <i class="fas fa-arrow-left"></i>
            </button>

            <a href="setup-customer.html" class="cancel-link">
                <i class="fas fa-forward"></i>
                تخطي هذه الخطوة والبدء لاحقاً
            </a>
        </form>
    </div>

    <!-- السكربتات -->
    <script type="module" src="js/add-customer.js"></script>
</body>
</html>
