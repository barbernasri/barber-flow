<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="إعداد الهوية البصرية للمتجر">
    <title>إعداد الهوية | BarberFlow Pro</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- التنسيقات العامة -->
    <link rel="stylesheet" href="../shared/css/global.css">
    
    <!-- تنسيقات التنبيهات -->
    <link rel="stylesheet" href="../auth/css/notifications.css">
    
    <!-- تنسيقات الصفحة -->
    <link rel="stylesheet" href="css/setup-style.css">
</head>
<body>
    <!-- حاوية الإشعارات -->
    <div id="notification-container"></div>

    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1 class="title">الخطوة الأخيرة 🪄</h1>
            <p class="subtitle">دعنا نجعل متجرك يبدو احترافياً أمام الزبائن</p>
        </div>

        <!-- نموذج الإعداد -->
        <form id="setupStoreForm">
            <!-- صورة الواجهة -->
            <div class="section-card">
                <label class="section-label">صورة الواجهة الرئيسية للمتجر</label>
                <div class="cover-uploader" id="coverUploader">
                    <img id="storeImg" style="display: none;" alt="صورة المتجر">
                    <i class="fas fa-store placeholder-icon" id="placeholderIcon"></i>
                    <span class="inner-label" id="coverUploaderLabel">اضغط لاختيار صورة مميزة للمتجر</span>
                    <button type="button" class="delete-btn" id="deleteCoverBtn" style="display: none; position: absolute; top: 10px; left: 10px;">
                        <i class="fas fa-times"></i>
                    </button>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                </div>
            </div>

            <!-- نبذة عن المتجر -->
            <div class="section-card">
                <label class="section-label">نبذة عن المتجر</label>
                <textarea id="storeAbout" placeholder="اكتب نبذة مختصرة عن متجرك ومنتجاتك..." rows="4"></textarea>
            </div>

            <!-- معرض المنتجات -->
            <div class="section-card">
                <label class="section-label">معرض صور المنتجات والمعروضات</label>
                <div class="gallery-grid" id="storePhotosGrid">
                    <div class="add-photo-btn" id="addStorePhotoBtn">
                        <i class="fas fa-plus-circle"></i>
                    </div>
                </div>
                <input type="file" id="galleryInput" accept="image/*" multiple style="display: none;">
            </div>

            <!-- السجل التجاري -->
            <div class="section-card">
                <label class="section-label">السجل التجاري والشهادات الرسمية</label>
                <div class="gallery-grid" id="certPhotosGrid">
                    <div class="add-photo-btn" id="addCertBtn">
                        <i class="fas fa-plus-circle"></i>
                        <span style="font-size: 0.7rem; display: block;">أضف وثيقة</span>
                    </div>
                </div>
                <input type="file" id="certInput" accept="image/*" multiple style="display: none;">
                
                <label class="section-label" style="margin-top: 15px;">رقم السجل التجاري (اختياري)</label>
                <input type="text" id="licenseText" placeholder="أدخل رقم السجل التجاري">
            </div>

            <!-- أزرار التحكم -->
            <button type="submit" class="primary-btn" id="submitBtn">
                <span>حفظ وإنشاء الملف الشخصي</span>
                <i class="fas fa-check"></i>
            </button>

            <button type="button" class="outline-btn" id="skipBtn">
                <i class="fas fa-forward"></i>
                <span>تخطي هذه الخطوة مؤقتاً</span>
            </button>
        </form>
    </div>

    <!-- السكربتات -->
    <script type="module" src="js/setup-store.js"></script>
</body>
</html>
