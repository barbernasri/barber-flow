<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="إعداد الهوية البصرية للصالون">
    <title>إعداد الهوية | BarberFlow Pro</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- التنسيقات العامة -->
    <link rel="stylesheet" href="../shared/css/global.css">
    
    <!-- تنسيقات التنبيهات -->
    <link rel="stylesheet" href="../auth/css/notifications.css">
    
    <!-- تنسيقات الصفحة -->
    <link rel="stylesheet" href="css/add-style.css">
</head>
<body>
    <!-- حاوية الإشعارات -->
    <div id="notification-container"></div>

    <div class="onboarding-page">
        <div class="onboarding-container">
            <!-- الهيدر -->
            <div class="page-header">
                <div class="step-indicator">
                    <span class="step">1</span>
                    <span class="step active">2</span>
                </div>
                <h1>الخطوة الأخيرة 🪄</h1>
                <div style="width: 40px;"></div>
            </div>

            <p class="page-subtitle">دعنا نجعل صالونك يبدو احترافياً أمام الزبائن</p>

            <!-- نموذج الإعداد -->
            <form id="setupSalonForm">
                <!-- صورة الواجهة -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-image"></i>
                        صورة الواجهة الرئيسية
                    </h2>
                    
                    <div class="cover-uploader" id="coverUploader">
                        <img id="salonImg" style="display: none;" alt="صورة الصالون">
                        <i class="fas fa-camera placeholder-icon" id="placeholderIcon"></i>
                        <span class="uploader-label" id="coverUploaderLabel">اضغط لاختيار صورة مميزة للواجهة</span>
                        <button type="button" class="delete-cover-btn" id="deleteCoverBtn" style="display: none;">
                            <i class="fas fa-times"></i>
                        </button>
                        <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    </div>
                </div>

                <!-- نبذة عن الصالون -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-info-circle"></i>
                        نبذة عن الصالون
                    </h2>
                    
                    <div class="input-group">
                        <label for="salonDescription">وصف مختصر</label>
                        <textarea 
                            id="salonDescription" 
                            rows="4" 
                            placeholder="اكتب نبذة مختصرة عن صالونك وخدماتك المميزة..."
                            style="width: 100%; padding: 14px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-primary); font-family: 'Cairo', sans-serif; font-size: 0.95rem; resize: vertical;"
                        ></textarea>
                    </div>
                </div>

                <!-- معرض الصور -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-images"></i>
                        معرض الصور لصالونك
                    </h2>
                    
                    <div class="photos-grid" id="galleryPreviewsContainer">
                        <div class="add-photo-btn" id="addGalleryPhotoBtn">
                            <i class="fas fa-plus-circle"></i>
                            <span style="font-size: 0.8rem;">أضف صورة</span>
                        </div>
                    </div>
                    <input type="file" id="galleryFileInput" accept="image/*" multiple style="display: none;">
                </div>

                <!-- الشهادات -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-certificate"></i>
                        الدبلومات والشهادات المهنية
                    </h2>
                    
                    <div class="input-group">
                        <label for="certificateText">عنوان الشهادة (اختياري)</label>
                        <input 
                            type="text" 
                            id="certificateText" 
                            placeholder="مثال: شهادة حلاقة احترافية من أكاديمية XYZ"
                        >
                    </div>
                    
                    <div class="photos-grid" id="certPreviewsContainer">
                        <div class="add-photo-btn" id="addCertPhotoBtn">
                            <i class="fas fa-plus-circle"></i>
                            <span style="font-size: 0.8rem;">أضف وثيقة</span>
                        </div>
                    </div>
                    <input type="file" id="certFileInput" accept="image/*" multiple style="display: none;">
                </div>

                <!-- أزرار التحكم -->
                <div class="form-actions">
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span>حفظ وإنشاء الملف الشخصي</span>
                        <i class="fas fa-check"></i>
                    </button>

                    <button type="button" class="cancel-btn" id="skipBtn">
                        <i class="fas fa-forward"></i>
                        <span>تخطي هذه الخطوة مؤقتاً</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- السكربتات -->
    <script type="module" src="js/setup-salon.js"></script>
</body>
</html>
