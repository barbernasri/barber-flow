<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيانات الصالون | BarberFlow-Pro</title>
    <link rel="stylesheet" href="css/add-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-icon"><i class="fas fa-id-card"></i></div>
            <h1 class="title">المعلومات الأساسية</h1>
            <p class="subtitle">أدخل تفاصيل صالونك لتفعيل نظام الحجوزات</p>
        </header>

        <form id="addSalonForm">
            <div class="section-card">
                <div class="input-group">
                    <label>اسم الصالون</label>
                    <input type="text" id="salonName" placeholder="مثلاً: صالون الأناقة" required>
                </div>
                <div class="input-group">
                    <label>المدينة / الحي</label>
                    <input type="text" id="salonLocation" placeholder="طنجة، كازاباراتا" required>
                </div>
                <div class="input-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="salonPhone" placeholder="06..." required>
                </div>
                <div class="input-group">
                    <label>نوع الصالون</label>
                    <select id="salonType" required>
                        <option value="" disabled selected>اختر نوع الصالون...</option>
                        <option value="رجالي">صالون رجالي (حلاقة وعناية)</option>
                        <option value="نسائي">صالون نسائي (مركز تجميل)</option>
                        <option value="يونيسكس">صالون مشترك (يونيسكس)</option>
                        <option value="متنقل">صالون متنقل (خدمات منزلية وفندقية)</option>
                        <option value="سبا">مركز سبا واسترخاء (Spa & Wellness)</option>
                        <option value="أطفال">صالون حلاقة للأطفال</option>
                    </select>
                </div>
            </div>

            <div class="section-card">
                <label class="section-label"><i class="fas fa-concierge-bell"></i> الخدمات والأسعار (خدمة واحدة على الأقل)</label>
                <div id="servicesList">
                    <div class="input-group dynamic-item" style="display: grid; grid-template-columns: 2fr 1fr auto; gap: 10px; margin-bottom: 10px;">
                        <input type="text" class="service-name" placeholder="اسم الخدمة (مثال: حلاقة شعر)" required>
                        <input type="number" class="service-price" placeholder="السعر (DH)" required>
                        <span style="width: 40px;"></span>
                    </div>
                </div>
                <button type="button" id="addServiceBtn" class="add-btn">
                    <i class="fas fa-plus"></i> إضافة خدمة أخرى
                </button>
            </div>

            <div class="section-card">
                <label class="section-label"><i class="fas fa-calendar-check"></i> طريقة تأكيد الحجوزات</label>
                <select id="bookingType" required>
                    <option value="تلقائي">تأكيد فوري وتلقائي (قوة السرعة)</option>
                    <option value="يدوي">موافقة يدوية من طرفي (تحكم كامل)</option>
                </select>
            </div>

            <div class="section-card">
                <label class="section-label"><i class="fas fa-clock"></i> أيام وأوقات العمل</label>
                <div class="days-grid" id="daysSelector"></div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
                    <div class="input-group">
                        <label>من</label>
                        <input type="time" id="openTime" value="09:00" required>
                    </div>
                    <div class="input-group">
                        <label>إلى</label>
                        <input type="time" id="closeTime" value="21:00" required>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">حفظ ومتابعة الإعداد</button>
            <a href="#" id="cancelLink" class="cancel-link">إلغاء وحذف الحساب</a>
        </form>
    </div>
    <div id="notification-container"></div>

    <script type="module" src="js/add-salon.js"></script>
</body>
</html>
