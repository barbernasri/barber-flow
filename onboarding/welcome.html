<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بك في BarberFlow Pro</title>
    <link rel="stylesheet" href="css/welcome.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="welcome-container">
        <div class="logo-section">
            <i class="fas fa-magic welcome-icon"></i>
        </div>

        <div class="text-section">
            <h1 id="welcomeTitle">مرحباً بك في مجتمعنا</h1>
            <p id="welcomeDesc">نحن سعداء جداً بانضمامك إلينا. لنبدأ بتخصيص تجربتك في BarberFlow-Pro.</p>
        </div>

        <div class="setup-card" id="setupCard">
            <div class="card-content">
                <i class="fas fa-tasks-alt"></i>
                <div>
                    <h4>إعداد ملفك الشخصي</h4>
                    <p>تبقى خطوة واحدة فقط لتبدأ رحلتك معنا.</p>
                </div>
            </div>
            <button id="startSetupBtn" class="main-btn">
                <span>ابدأ الإعداد الآن</span>
                <i class="fas fa-arrow-left"></i>
            </button>
        </div>

        <footer class="welcome-footer">
            <p>BarberFlow-Pro &copy; 2026 - تجربة حلاقة عصرية</p>
        </footer>
    </div>

    <script type="module" src="js/welcome.js"></script>
</body>
</html>
