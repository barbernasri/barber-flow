<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيانات المتجر | BarberFlow-Pro</title>
    <link rel="stylesheet" href="css/add-style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<!--    <script type="module" src="../auth/js/router.js"></script>-->
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-icon"><i class="fas fa-store-alt"></i></div>
            <h1 class="title">إعداد المتجر</h1>
            <p class="subtitle">أدخل تفاصيل متجرك لتبدأ في عرض وبيع منتجاتك</p>
        </header>

        <form id="addStoreForm">
            <div class="section-card">
                <div class="input-group">
                    <label>اسم المتجر</label>
                    <input type="text" id="storeName" placeholder="مثلاً: متجر الحلاقة المحترف" required>
                </div>
                <div class="input-group">
                    <label>الموقع (المدينة/الحي)</label>
                    <input type="text" id="storeLocation" placeholder="الدار البيضاء، المعاريف" required>
                </div>
            </div>

            <div class="section-card">
                <label class="section-label"><i class="fas fa-tags"></i> الأقسام التجارية لمنتجاتك</label>
                <div id="categoriesContainer"></div>
                <button type="button" id="addCategoryBtn" class="add-btn" style="margin-top:10px; background: none; border: 1px dashed var(--gold-primary, #d4af37); color: var(--gold-primary, #d4af37); padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                    <i class="fas fa-plus"></i> إضافة قسم جديد
                </button>
            </div>

            <div class="section-card">
                <label class="section-label"><i class="fas fa-truck"></i> خيارات الطلب والتوصيل</label>
                <select id="deliveryType" required>
                    <option value="استلام">الاستلام من المتجر فقط</option>
                    <option value="توصيل">خدمة التوصيل متوفرة</option>
                    <option value="الكل">الاستلام والتوصيل معاً</option>
                </select>
            </div>

            <div class="section-card">
                <label class="section-label"><i class="fas fa-clock"></i> أوقات وأيام العمل</label>
                <div class="days-grid" id="daysSelector"></div>
                
                <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;\">
                    <div class="input-group">
                        <label>من</label>
                        <input type="time" id="openTime" value="10:00" required>
                    </div>
                    <div class="input-group">
                        <label>إلى</label>
                        <input type="time" id="closeTime" value="22:00" required>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">حفظ ومتابعة إعداد المنتجات</button>
        </form>
    </div>
    <div id="notification-container"></div>

    <script type="module" src="js/add-store.js"></script>
</body>
</html>
